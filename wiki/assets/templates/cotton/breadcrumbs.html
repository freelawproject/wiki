<c-vars breadcrumbs />

{% if breadcrumbs %}
<nav class="text-sm text-gray-500 dark:text-gray-400 mb-4">
  {% for title, url in breadcrumbs %}
    {% if not forloop.last %}
      <a href="{{ url }}" class="hover:underline">{{ title }}</a>
      <span class="mx-1">/</span>
    {% else %}
      <a href="{{ url }}" class="text-gray-900 dark:text-gray-100 font-medium hover:underline">{{ title }}</a>
    {% endif %}
  {% endfor %}
</nav>
{% endif %}
