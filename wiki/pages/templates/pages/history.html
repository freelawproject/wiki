{% extends "base.html" %}
{% load static %}

{% block title %}History: {{ page.title }} - FLP Wiki{% endblock %}

{% block content %}
<div class="max-w-3xl">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl">History: {{ page.title }}</h1>
    <a href="{{ page.get_absolute_url }}" class="btn-outline text-sm">Back to Page</a>
  </div>

  {% include "includes/_revision_list.html" %}
</div>
{% endblock %}

{% block footer_scripts %}
<script type="application/json" id="history-config">
{
  "diffBase": "{{ diff_base }}"
}
</script>
<script src="{% static 'js/revision-history.js' %}"></script>
{% endblock %}
