# Run using `docker compose up` from this directory.
#
# Multiple instances (e.g. worktrees) can run simultaneously by setting
# COMPOSE_PROJECT_NAME, DJANGO_HOST_PORT, and POSTGRES_HOST_PORT to
# unique values per instance.  Without container_name directives,
# Compose auto-generates unique names from the project name.
networks:
  wiki_net:
    driver: bridge

services:
  # Database (PostgreSQL)
  wiki-postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "wiki"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki_net

  # Tailwind CSS watcher (rebuilds on file change)
  wiki-tailwind:
    image: node:22
    volumes:
      - ${WIKI_BASE_DIR:-../../}:/opt/wiki
    working_dir: /opt/wiki
    env_file:
      - ../../.env.dev
    command: sh -c 'npm install && npm run dev'
    tty: true

  # Daemon for periodic tasks (view counts, search vectors, cleanup)
  wiki-daemon:
    build:
      context: "${WIKI_BASE_DIR:-../../}"
      dockerfile: "./docker/django/Dockerfile"
      args:
        BUILD_ENV: dev
    command: run_daemon
    depends_on:
      wiki-postgres:
        condition: service_healthy
    user: root
    volumes:
      - ${WIKI_BASE_DIR:-../../}:/opt/wiki
    networks:
      - wiki_net
    env_file:
      - ../../.env.dev

  # Django dev server
  wiki-django:
    build:
      context: "${WIKI_BASE_DIR:-../../}"
      dockerfile: "./docker/django/Dockerfile"
      args:
        BUILD_ENV: dev
    command: web-dev
    depends_on:
      wiki-postgres:
        condition: service_healthy
    ports:
      - "${DJANGO_HOST_PORT:-8001}:8000"
    user: root
    volumes:
      - ${WIKI_BASE_DIR:-../../}:/opt/wiki
    networks:
      - wiki_net
    env_file:
      - ../../.env.dev
